<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trace Sequence</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
    
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            background-color: #000; /* Pure black background */
            overflow: hidden; /* Prevent scrolling */
        }
        
        #map {
            width: 100vw;
            height: 100vh;
            background-color: #000;
        }

        /* 
           This CSS filter takes a standard dark grayscale map 
           and turns it into a glowing, high-contrast neon green.
        */
        .leaflet-tile {
            filter: brightness(0.8) contrast(2) sepia(1) hue-rotate(70deg) saturate(5);
        }

        /* Ensure Leaflet controls are completely hidden */
        .leaflet-control-container {
            display: none !important;
        }
    </style>
</head>
<body>

    <!-- Fullscreen Map Container -->
    <div id="map"></div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    
    <script>
        // 1. Initialize map (Removed ALL controls and watermarks)
        const map = L.map('map', {
            zoomControl: false,
            attributionControl: false, // Removes the watermark
            scrollWheelZoom: false,
            dragging: false,
            doubleClickZoom: false,
            boxZoom: false,
            keyboard: false
        }).setView([20, 0], 2);

        // 2. Add dark map tiles (using the version with no city/country text labels)
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png', {
            subdomains: 'abcd',
            maxZoom: 20
        }).addTo(map);

        // 3. Animation Sequence Function
        async function animateZoomSequence(lat, lon) {
            const targetLatLng = [lat, lon];

            // Wait a moment before starting the trace
            await new Promise(r => setTimeout(r, 1000));

            // Create the targeting circle (Starts massive: ~3000km radius)
            const trackingCircle = L.circle(targetLatLng, {
                color: '#00ff00',      // Neon hacker green
                weight: 2,
                fillColor: '#00ff00',
                fillOpacity: 0.15,
                radius: 3000000 
            }).addTo(map);
            
            // STAGE 1: Continent Level
            map.flyTo(targetLatLng, 4, { duration: 2.5, easeLinearity: 0.25 });
            await new Promise(r => setTimeout(r, 1000));
            // Shrink circle to regional
            trackingCircle.setRadius(1000000); 
            await new Promise(r => setTimeout(r, 2000));

            // STAGE 2: Country/State Level
            map.flyTo(targetLatLng, 7, { duration: 2.5 });
            await new Promise(r => setTimeout(r, 1000));
            // Shrink circle to local area
            trackingCircle.setRadius(250000);
            await new Promise(r => setTimeout(r, 2000));

            // STAGE 3: City Level
            map.flyTo(targetLatLng, 12, { duration: 2.5 });
            await new Promise(r => setTimeout(r, 1000));
            // Shrink circle to exact pinpoint
            trackingCircle.setRadius(10000);
        }

        // 4. Fetch the visitor's IP and Coordinates via HTTPS
        fetch('https://ipapi.co/json/')
            .then(response => response.json())
            .then(data => {
                // If the fetch is successful and returns coordinates, start the animation
                if (!data.error && data.latitude && data.longitude) {
                    animateZoomSequence(data.latitude, data.longitude);
                }
            })
            .catch(error => {
                console.error('Trace failed:', error);
            });
    </script>
</body>
</html>
