<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sick.ly</title>
    <style>
        :root {
            --bg-color: #030303;
            --term-green: #39ff14;
            --term-glow: 0 0 5px rgba(57, 255, 20, 0.4), 0 0 10px rgba(57, 255, 20, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--term-green);
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            position: relative;
        }

        /* CRT Scanline Effect */
        body::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        /* Terminal Boot Screen - Moved to Top Left */
        #boot-screen {
            position: absolute;
            top: 25px;
            left: 25px;
            z-index: 10;
        }

        .log-line {
            position: absolute;
            top: 0;
            left: 0;
            white-space: nowrap;
            font-size: 14px;
            text-shadow: var(--term-glow);
            opacity: 0;
            transition: opacity 1s ease-in-out; /* Smooth crossfade */
        }

        .log-line.active {
            opacity: 1;
        }

        /* Main Site Content */
        #main-content {
            opacity: 0;
            text-align: center;
            z-index: 5;
            transform: scale(0.95);
            transition: opacity 2s ease, transform 2s ease;
        }

        #main-content.visible {
            opacity: 1;
            transform: scale(1);
        }

        h1 {
            font-size: 5rem;
            font-weight: normal;
            letter-spacing: -2px;
            text-shadow: 0 0 10px rgba(57, 255, 20, 0.5), 0 0 20px rgba(57, 255, 20, 0.3);
            position: relative;
        }

        /* Blinking Cursor */
        .cursor {
            display: inline-block;
            width: 20px;
            height: 1em;
            background-color: var(--term-green);
            vertical-align: bottom;
            animation: blink 1s step-end infinite;
            margin-left: 5px;
            box-shadow: var(--term-glow);
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        p.subtitle {
            margin-top: 10px;
            font-size: 1.2rem;
            opacity: 0.8;
            text-shadow: var(--term-glow);
        }

        /* Sleek Social Buttons */
        .socials {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 40px;
        }

        .social-btn {
            color: var(--term-green);
            text-decoration: none;
            font-size: 0.9rem;
            padding: 10px 20px;
            border: 1px solid var(--term-green);
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            box-shadow: 0 0 5px rgba(57, 255, 20, 0.1);
            position: relative;
            overflow: hidden;
        }

        .social-btn:hover {
            background-color: var(--term-green);
            color: var(--bg-color);
            box-shadow: var(--term-glow);
            font-weight: bold;
        }

        @media (max-width: 600px) {
            h1 { font-size: 3.5rem; }
            .socials { flex-direction: column; gap: 15px; align-items: center; }
            .social-btn { width: 200px; }
            #boot-screen { top: 15px; left: 15px; }
            .log-line { font-size: 12px; }
        }
    </style>
</head>
<body>

    <div id="boot-screen"></div>

    <div id="main-content">
        <h1>sick.ly<span class="cursor"></span></h1>
        <p class="subtitle">// graham</p>
        
        <div class="socials">
            <a href="https://discord.com/users/947924966769328158" class="social-btn" target="_blank">Discord</a>
            <a href="https://t.me/arerosesred" class="social-btn" target="_blank">Telegram</a>
            <a href="https://www.instagram.com/graham2tired" class="social-btn" target="_blank">Instagram</a>
        </div>
    </div>

    <script>
        const bootScreen = document.getElementById('boot-screen');
        const mainContent = document.getElementById('main-content');
        
        const bootSequence = [
            "INIT ROOT PROCESS...",
            "LOADING KERNEL MODULES [OK]",
            "MOUNTING VFS: /dev/sda1 [OK]",
            "STARTING NETWORK DAEMON...",
            "RESOLVING HOST: sick.ly",
            "ESTABLISHING SECURE CONNECTION...",
            "HANDSHAKE SUCCESSFUL.",
            "DECRYPTING PAYLOAD...",
            "ACCESS GRANTED."
        ];

        // The loading spinner characters
        const spinnerFrames = ['/', '-', '\\', '|'];
        
        let lineIndex = 0;
        let activeLineElement = null;
        let spinnerInterval = null;

        function advanceBoot() {
            // Fade out the previous line if it exists
            if (activeLineElement) {
                activeLineElement.classList.remove('active');
            }

            // If we still have lines left to print
            if (lineIndex < bootSequence.length) {
                const newLine = document.createElement('div');
                newLine.className = 'log-line active';
                bootScreen.appendChild(newLine);
                
                let spinnerIndex = 0;
                
                // Clear any old intervals just in case
                clearInterval(spinnerInterval);
                
                // Run the spinner animation
                spinnerInterval = setInterval(() => {
                    newLine.textContent = `[${spinnerFrames[spinnerIndex]}] ${bootSequence[lineIndex]}`;
                    spinnerIndex = (spinnerIndex + 1) % spinnerFrames.length;
                }, 100);

                activeLineElement = newLine;
                lineIndex++;
                
                // Slower random delay between 1.2 and 2.2 seconds per line
                const nextDelay = Math.floor(Math.random() * 1000) + 1200;
                setTimeout(advanceBoot, nextDelay);
                
            } else {
                // Boot sequence finished
                clearInterval(spinnerInterval);
                
                // Wait just a second for the final fade out, then show the main site
                setTimeout(() => {
                    mainContent.classList.add('visible');
                }, 1000);
            }
        }

        // Start the boot sequence when the page loads
        window.onload = () => {
            setTimeout(advanceBoot, 800);
        };
    </script>
</body>
</html>
