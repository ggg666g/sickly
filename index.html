<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sick.ly</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #030303;
            --term-green: #39ff14;
            /* Functional glow values, downstream handles final appearance */
            --subtle-glow: 0 0 10px rgba(57, 255, 20, 0.4), inset 0 0 10px rgba(57, 255, 20, 0.2);
            --pulse-glow: 0 0 100px 30px rgba(57, 255, 20, 0.8), inset 0 0 50px rgba(57, 255, 20, 0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--term-green);
            font-family: 'Share Tech Mono', 'Courier New', Courier, monospace;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            position: relative;
        }

        /* dedicated container for the beat-sync edge glow visualizer */
        #edge-glow-visualizer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1; /* lies behind all content, but in front of body background */
            pointer-events: none; /* allows clicking things through the glow */
            box-shadow: var(--subtle-glow); /* initial subtle state */
            transition: box-shadow 0.1s ease-out; /* fast jump on beat, smooth decay */
            opacity: 0; /* hidden until audio starts */
        }

        /* CRT Scanline Effect */
        body::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2; /* lies over everything else */
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        /* Initialize Screen */
        #init-screen {
            position: absolute;
            z-index: 20;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            transition: opacity 0.5s ease;
        }

        #init-btn {
            background: none;
            border: 1px solid var(--term-green);
            color: var(--term-green);
            font-family: inherit;
            font-size: 1.2rem;
            padding: 15px 30px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.2s ease;
            animation: pulse-init 2s infinite;
        }

        #init-btn:hover {
            background-color: var(--term-green);
            color: var(--bg-color);
            font-weight: bold;
        }

        @keyframes pulse-init {
            0% { opacity: 0.8; box-shadow: 0 0 5px rgba(57, 255, 20, 0.4); }
            50% { opacity: 1; box-shadow: 0 0 20px rgba(57, 255, 20, 0.8); }
            100% { opacity: 0.8; box-shadow: 0 0 5px rgba(57, 255, 20, 0.4); }
        }

        /* Terminal Boot Screen */
        #boot-screen {
            position: absolute;
            top: 25px;
            left: 25px;
            z-index: 10;
            display: none;
            flex-direction: column;
            transition: opacity 0.5s ease-out;
        }

        .log-line {
            font-size: 20px;
            margin-bottom: 6px;
        }

        /* Main Site Content */
        #main-content {
            opacity: 0;
            text-align: center;
            z-index: 5;
            transform: scale(0.95);
            transition: opacity 2s ease, transform 2s ease;
            pointer-events: none; 
        }

        #main-content.visible {
            opacity: 1;
            transform: scale(1);
            pointer-events: auto;
        }

        h1 {
            font-size: 5rem;
            font-weight: normal;
            letter-spacing: -2px;
            position: relative;
        }

        .cursor {
            display: inline-block;
            width: 20px;
            height: 1em;
            background-color: var(--term-green);
            vertical-align: bottom;
            animation: blink 1s step-end infinite;
            margin-left: 5px;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        p.subtitle {
            margin-top: 10px;
            font-size: 1.2rem;
            opacity: 0.8;
        }

        /* Sleek Social Buttons */
        .socials {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 40px;
        }

        .social-btn {
            color: var(--term-green);
            text-decoration: none;
            font-size: 0.9rem;
            padding: 10px 20px;
            border: 1px solid var(--term-green);
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .social-btn:hover {
            background-color: var(--term-green);
            color: var(--bg-color);
            font-weight: bold;
        }

        @media (max-width: 600px) {
            h1 { font-size: 3.5rem; }
            .socials { flex-direction: column; gap: 15px; align-items: center; }
            .social-btn { width: 200px; }
            #boot-screen { top: 15px; left: 15px; }
            .log-line { font-size: 16px; }
        }
    </style>
</head>
<body>

    <div id="edge-glow-visualizer"></div>

    <div id="init-screen">
        <button id="init-btn">[ INITIATE CONNECTION ]</button>
    </div>

    <div id="boot-screen"></div>

    <div id="main-content">
        <h1>sick.ly<span class="cursor"></span></h1>
        <p class="subtitle">// graham</p>
        
        <div class="socials">
            <a href="https://discord.com/users/947924966769328158" class="social-btn" target="_blank">Discord</a>
            <a href="https://t.me/arerosesred" class="social-btn" target="_blank">Telegram</a>
            <a href="https://www.instagram.com/graham2tired" class="social-btn" target="_blank">Instagram</a>
        </div>
    </div>

    <script>
        const initScreen = document.getElementById('init-screen');
        const initBtn = document.getElementById('init-btn');
        const bootScreen = document.getElementById('boot-screen');
        const mainContent = document.getElementById('main-content');
        const edgeVisualizer = document.getElementById('edge-glow-visualizer');
        
        // Define your audio file and parameters
        const siteAudio = new Audio('audio.mp3');
        siteAudio.loop = true; 
        siteAudio.volume = 0.2; // Volume capped at 20%
        
        const bootSequence = [
            "INIT ROOT PROCESS...",
            "LOADING KERNEL MODULES...",
            "MOUNTING VFS: /dev/sda1...",
            "STARTING NETWORK DAEMON...",
            "RESOLVING HOST: sick.ly...",
            "ESTABLISHING SECURE CONNECTION...",
            "HANDSHAKE SUCCESSFUL.",
            "DECRYPTING PAYLOAD...",
            "ACCESS GRANTED."
        ];

        const spinnerFrames = ['/', '-', '\\', '|'];
        let lineIndex = 0;
        let spinnerInterval = null;

        // Visualizer State Variables
        let audioContext = null;
        let analyser = null;
        let dataArray = null;
        let isAudioSetup = false;
        let beatThreshold = 1.35; // How much louder bass must be than average to register a beat
        let bassAverage = 0;

        // Start the sequence when the user clicks the button
        initBtn.addEventListener('click', () => {
            initScreen.style.opacity = '0';
            
            // Setup Audio Context on the user interaction (required by browsers)
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            setupAudioAnalyser();

            setTimeout(() => {
                initScreen.style.display = 'none';
                bootScreen.style.display = 'flex';
                advanceBoot();
            }, 300);
        });

        function setupAudioAnalyser() {
            if (!audioContext || isAudioSetup) return;

            // Create analyser node
            analyser = audioContext.createAnalyser();
            analyser.fftSize = 256; // Smaller FFT size for focused beat detection

            // Connect media element source to analyser, and analyser to speakers
            const source = audioContext.createMediaElementSource(siteAudio);
            source.connect(analyser);
            analyser.connect(audioContext.destination);

            // Buffer to hold frequency data
            const bufferLength = analyser.frequencyBinCount;
            dataArray = new Uint8Array(bufferLength);

            isAudioSetup = true;
        }

        function detectBeat() {
            if (!analyser || !dataArray) return;

            // Fill dataArray with current audio snapshot
            analyser.getByteFrequencyData(dataArray);

            // Focus on low frequencies (bass/drums) – typically first 10 bins
            let sumBass = 0;
            const bassBins = 10; 
            for (let i = 0; i < bassBins; i++) {
                sumBass += dataArray[i];
            }
            const currentBassAverage = sumBass / bassBins;

            // Use a running average for stability
            bassAverage = (bassAverage * 0.95) + (currentBassAverage * 0.05);

            // If current bass volume is spike significantly above recent average
            if (currentBassAverage > bassAverage * beatThreshold && currentBassAverage > 50) {
                pulseEdgeGlow();
            }

            // Loop the detection
            requestAnimationFrame(detectBeat);
        }

        function pulseEdgeGlow() {
            // Apply intense glow instantantly
            edgeVisualizer.style.boxShadow = getComputedStyle(document.documentElement).getPropertyValue('--pulse-glow');
            
            // Fast reset to subtle glow using transition
            setTimeout(() => {
                edgeVisualizer.style.boxShadow = getComputedStyle(document.documentElement).getPropertyValue('--subtle-glow');
            }, 50); // Decay starts after a very short hold
        }

        function advanceBoot() {
            if (lineIndex < bootSequence.length) {
                const newLine = document.createElement('div');
                newLine.className = 'log-line';
                bootScreen.appendChild(newLine);
                
                let spinnerIndex = 0;
                clearInterval(spinnerInterval);
                
                spinnerInterval = setInterval(() => {
                    newLine.textContent = `${bootSequence[lineIndex]} ${spinnerFrames[spinnerIndex]}`;
                    spinnerIndex = (spinnerIndex + 1) % spinnerFrames.length;
                }, 50);

                const nextDelay = Math.floor(Math.random() * 300) + 150; 
                
                setTimeout(() => {
                    clearInterval(spinnerInterval);
                    newLine.textContent = bootSequence[lineIndex]; 
                    lineIndex++;
                    advanceBoot();
                }, nextDelay);
                
            } else {
                // Boot sequence finished
                
                // Play audio and start detection simultaneously
                siteAudio.play().then(() => {
                    detectBeat(); // Start sound analysis loop
                }).catch(err => console.log("Audio failed to play:", err));

                // Show main site and reveal subtle edge glow container
                setTimeout(() => {
                    bootScreen.style.opacity = '0';
                    
                    setTimeout(() => {
                        bootScreen.style.display = 'none';
                        edgeVisualizer.style.opacity = '1'; // Reveal visualizer element
                        mainContent.classList.add('visible');
                    }, 500);
                }, 400); 
            }
        }
    </script>
</body>
</html>
