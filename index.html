<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sick.ly</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #030303;
            --term-green: #39ff14;
            --term-glow: 0 0 5px rgba(57, 255, 20, 0.4), 0 0 10px rgba(57, 255, 20, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--term-green);
            font-family: 'Share Tech Mono', 'Courier New', Courier, monospace;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            position: relative;
        }

        /* CRT Scanline Effect */
        body::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        /* Initialize Screen to bypass Autoplay blockers */
        #init-screen {
            position: absolute;
            z-index: 20;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            transition: opacity 0.5s ease;
        }

        #init-btn {
            background: none;
            border: 1px solid var(--term-green);
            color: var(--term-green);
            font-family: inherit;
            font-size: 1.2rem;
            padding: 15px 30px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: var(--term-glow);
            transition: all 0.2s ease;
            animation: pulse 2s infinite;
        }

        #init-btn:hover {
            background-color: var(--term-green);
            color: var(--bg-color);
            font-weight: bold;
        }

        @keyframes pulse {
            0% { opacity: 0.8; box-shadow: 0 0 5px rgba(57, 255, 20, 0.4); }
            50% { opacity: 1; box-shadow: 0 0 20px rgba(57, 255, 20, 0.8); }
            100% { opacity: 0.8; box-shadow: 0 0 5px rgba(57, 255, 20, 0.4); }
        }

        /* Terminal Boot Screen */
        #boot-screen {
            position: absolute;
            top: 25px;
            left: 25px;
            z-index: 10;
            display: none; /* Hidden until Init */
            flex-direction: column;
            transition: opacity 0.5s ease-out; /* Sped up fade out */
        }

        .log-line {
            font-size: 20px; /* MADE TEXT LARGER */
            text-shadow: var(--term-glow);
            margin-bottom: 6px;
        }

        /* Main Site Content */
        #main-content {
            opacity: 0;
            text-align: center;
            z-index: 5;
            transform: scale(0.95);
            transition: opacity 2s ease, transform 2s ease;
            pointer-events: none; 
        }

        #main-content.visible {
            opacity: 1;
            transform: scale(1);
            pointer-events: auto;
        }

        h1 {
            font-size: 5rem;
            font-weight: normal;
            letter-spacing: -2px;
            text-shadow: 0 0 10px rgba(57, 255, 20, 0.5), 0 0 20px rgba(57, 255, 20, 0.3);
            position: relative;
        }

        .cursor {
            display: inline-block;
            width: 20px;
            height: 1em;
            background-color: var(--term-green);
            vertical-align: bottom;
            animation: blink 1s step-end infinite;
            margin-left: 5px;
            box-shadow: var(--term-glow);
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        p.subtitle {
            margin-top: 10px;
            font-size: 1.2rem;
            opacity: 0.8;
            text-shadow: var(--term-glow);
        }

        /* Sleek Social Buttons */
        .socials {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 40px;
        }

        .social-btn {
            color: var(--term-green);
            text-decoration: none;
            font-size: 0.9rem;
            padding: 10px 20px;
            border: 1px solid var(--term-green);
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            box-shadow: 0 0 5px rgba(57, 255, 20, 0.1);
            position: relative;
            overflow: hidden;
        }

        .social-btn:hover {
            background-color: var(--term-green);
            color: var(--bg-color);
            box-shadow: var(--term-glow);
            font-weight: bold;
        }

        @media (max-width: 600px) {
            h1 { font-size: 3.5rem; }
            .socials { flex-direction: column; gap: 15px; align-items: center; }
            .social-btn { width: 200px; }
            #boot-screen { top: 15px; left: 15px; }
            .log-line { font-size: 16px; } /* MADE MOBILE TEXT LARGER */
        }
    </style>
</head>
<body>

    <div id="init-screen">
        <button id="init-btn">[ INITIATE CONNECTION ]</button>
    </div>

    <div id="boot-screen"></div>

    <div id="main-content">
        <h1>sick.ly<span class="cursor"></span></h1>
        <p class="subtitle">// graham</p>
        
        <div class="socials">
            <a href="https://discord.com/users/947924966769328158" class="social-btn" target="_blank">Discord</a>
            <a href="https://t.me/arerosesred" class="social-btn" target="_blank">Telegram</a>
            <a href="https://www.instagram.com/graham2tired" class="social-btn" target="_blank">Instagram</a>
        </div>
    </div>

    <script>
        const initScreen = document.getElementById('init-screen');
        const initBtn = document.getElementById('init-btn');
        const bootScreen = document.getElementById('boot-screen');
        const mainContent = document.getElementById('main-content');
        
        // Define your audio file here
        const siteAudio = new Audio('audio.mp3');
        siteAudio.loop = true; 
        siteAudio.volume = 0.2; // LOWERED VOLUME TO 20%
        
        const bootSequence = [
            "INIT ROOT PROCESS...",
            "LOADING KERNEL MODULES...",
            "MOUNTING VFS: /dev/sda1...",
            "STARTING NETWORK DAEMON...",
            "RESOLVING HOST: sick.ly...",
            "ESTABLISHING SECURE CONNECTION...",
            "HANDSHAKE SUCCESSFUL.",
            "DECRYPTING PAYLOAD...",
            "ACCESS GRANTED."
        ];

        const spinnerFrames = ['/', '-', '\\', '|'];
        let lineIndex = 0;
        let spinnerInterval = null;

        // Start the sequence when the user clicks the button
        initBtn.addEventListener('click', () => {
            initScreen.style.opacity = '0';
            
            setTimeout(() => {
                initScreen.style.display = 'none';
                bootScreen.style.display = 'flex';
                advanceBoot();
            }, 300); // Sped up init transition
        });

        function advanceBoot() {
            if (lineIndex < bootSequence.length) {
                const newLine = document.createElement('div');
                newLine.className = 'log-line';
                bootScreen.appendChild(newLine);
                
                let spinnerIndex = 0;
                
                clearInterval(spinnerInterval);
                
                // Keep spinner moving fast
                spinnerInterval = setInterval(() => {
                    newLine.textContent = `${bootSequence[lineIndex]} ${spinnerFrames[spinnerIndex]}`;
                    spinnerIndex = (spinnerIndex + 1) % spinnerFrames.length;
                }, 50); // Sped up spinner

                // FASTER random delay between 0.15 and 0.45 seconds per line
                const nextDelay = Math.floor(Math.random() * 300) + 150; 
                
                setTimeout(() => {
                    clearInterval(spinnerInterval);
                    newLine.textContent = bootSequence[lineIndex]; 
                    
                    lineIndex++;
                    advanceBoot();
                }, nextDelay);
                
            } else {
                // Boot sequence is completely finished
                
                // Play the audio!
                siteAudio.play().catch(err => console.log("Audio failed to play:", err));
                
                // Fade out terminal and show main site
                setTimeout(() => {
                    bootScreen.style.opacity = '0';
                    
                    setTimeout(() => {
                        bootScreen.style.display = 'none';
                        mainContent.classList.add('visible');
                    }, 500); // Sped up final transition
                }, 400); // Sped up hold before fade
            }
        }
    </script>
</body>
</html>
